# Vale configuration file
# Docs: https://vale.sh/docs/topics/config/

StylesPath = .vale/styles
MinAlertLevel = warning

# MDX-Dateien als Markdown behandeln
[formats]
mdx = md

# Englische Content-Dateien prüfen
[src/content/**/*.{md,mdx}]
BasedOnStyles = Vale, write-good, Microsoft, Base
Vale.Spelling.IgnoredWords = adesso

# Vale-Kernregeln
Vale.Spelling = YES
Vale.Repetition = YES
Vale.Wordiness = YES

# Custom Vocabulary (Wörterbuch-Datei)
Vale.Vocabulary = YES

# write-good Regeln (Englisch)
write-good.Weasel = YES
write-good.TooWordy = YES
write-good.Passive = YES
write-good.Adverbs = YES
write-good.So = YES
write-good.ThereIs = YES
write-good.Cliches = YES

# Microsoft Style Guide Regeln
Microsoft.Gender = YES
Microsoft.PassiveVoice = YES
Microsoft.Cliches = YES
Microsoft.Jargon = YES
Microsoft.Complexity = YES
Microsoft.Redundancy = YES
Microsoft.Spelling = YES