name: Deploy to GitHub Pages

# Trigger: Bei Push auf main oder manuell auslösbar
on:
  push:
    branches: [main]
  workflow_dispatch:

# Berechtigungen für GitHub Actions
permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deploy gleichzeitig erlaubt
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Schritt 1: Website bauen
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # Schritt 2: Zu GitHub Pages deployen
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4